<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🏐 Green Arago 2026 — Live</title>
<style>
  :root {
    --green:#16a34a; --green-dark:#14532d; --green-pale:#dcfce7;
    --bg:#f0fdf4; --card:#ffffff; --text:#111827; --muted:#6b7280; --border:#d1fae5;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; max-width:480px; margin:0 auto; }

  .header { background:linear-gradient(135deg,var(--green-dark),var(--green)); color:white; padding:18px 20px 14px; position:sticky; top:0; z-index:100; box-shadow:0 2px 20px rgba(0,0,0,0.2); }
  .header-title { font-size:17px; font-weight:800; }
  .header-sub { font-size:12px; opacity:0.85; margin-top:3px; display:flex; align-items:center; gap:6px; }
  .live-dot { width:8px; height:8px; border-radius:50%; background:#86efac; animation:pulse 2s infinite; flex-shrink:0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .nav { display:flex; background:white; border-bottom:2px solid var(--border); overflow-x:auto; scrollbar-width:none; position:sticky; top:64px; z-index:99; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
  .nav::-webkit-scrollbar { display:none; }
  .nav-btn { flex:0 0 auto; padding:11px 14px; font-size:12px; font-weight:700; color:var(--muted); cursor:pointer; border:none; background:none; border-bottom:3px solid transparent; white-space:nowrap; }
  .nav-btn.active { color:var(--green); border-bottom-color:var(--green); }

  .main { padding:14px; padding-bottom:30px; }
  .page { display:none; }
  .page.active { display:block; }

  .card { background:white; border-radius:16px; padding:14px; margin-bottom:12px; box-shadow:0 4px 16px rgba(22,163,74,0.08); border:1px solid var(--border); }
  .card-title { font-size:14px; font-weight:700; color:var(--green-dark); margin-bottom:12px; }

  /* TOURNOI SELECTOR */
  .t-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .t-btn { background:white; border:2px solid var(--border); border-radius:14px; padding:14px 10px; text-align:center; cursor:pointer; font-size:12px; font-weight:700; transition:all 0.2s; }
  .t-btn .emoji { font-size:22px; display:block; margin-bottom:5px; }
  .t-btn.active { border-color:currentColor; }
  .t-btn.jeunes { color:#2563eb; } .t-btn.jeunes.active { background:#eff6ff; }
  .t-btn.mixte  { color:#ea580c; } .t-btn.mixte.active  { background:#fff7ed; }
  .t-btn.feminin{ color:#db2777; } .t-btn.feminin.active { background:#fdf2f8; }
  .t-btn.loisir { color:#2563eb; } .t-btn.loisir.active  { background:#eff6ff; }
  .t-btn.elite  { color:#7c3aed; } .t-btn.elite.active   { background:#f5f3ff; }

  /* PHASE TABS */
  .phase-tabs { display:flex; gap:8px; margin-bottom:14px; overflow-x:auto; scrollbar-width:none; }
  .phase-tabs::-webkit-scrollbar { display:none; }
  .phase-tab { flex:0 0 auto; padding:7px 14px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; border:2px solid var(--border); background:white; color:var(--muted); }
  .phase-tab.active { background:var(--green); border-color:var(--green); color:white; }

  /* POULE */
  .poule-block { margin-bottom:20px; border-top:2px solid var(--border); padding-top:14px; }
  .poule-title { font-size:14px; font-weight:800; color:var(--green-dark); margin-bottom:10px; }

  /* MATCH ROW */
  .match-row { display:flex; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid #f9fafb; font-size:13px; }
  .match-row:last-child { border-bottom:none; }
  .match-teams { flex:1; }
  .match-name { font-weight:600; }
  .match-name.winner { color:var(--green); font-weight:800; }
  .score-badge { font-size:16px; font-weight:800; min-width:28px; text-align:center; }
  .score-sep { color:var(--muted); font-weight:700; }
  .pending { font-size:11px; color:var(--muted); font-style:italic; }

  /* CLASSEMENT */
  .rank-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:10px; }
  .rank-table th { padding:6px 4px; color:var(--muted); font-size:10px; font-weight:700; text-transform:uppercase; border-bottom:1px solid var(--border); text-align:left; }
  .rank-table td { padding:8px 4px; border-bottom:1px solid #f9fafb; vertical-align:middle; }
  .rank-badge { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; font-size:11px; font-weight:800; }
  .r1 { background:#fef3c7; color:#92400e; }
  .r2 { background:#f3f4f6; color:#374151; }
  .r3 { background:#fee2e2; color:#991b1b; }
  .rn { background:#f9fafb; color:var(--muted); }

  /* BRACKET */
  .round-title { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); text-align:center; margin:14px 0 10px; display:flex; align-items:center; gap:8px; }
  .round-title::before,.round-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .bracket-match { background:white; border:1.5px solid var(--border); border-radius:12px; padding:10px 12px; margin-bottom:8px; }
  .bracket-match.played { border-color:#a7f3d0; }
  .bracket-team { display:flex; align-items:center; gap:8px; padding:5px 0; font-size:13px; font-weight:600; }
  .bracket-team + .bracket-team { border-top:1px solid #f3f4f6; }
  .bracket-team.winner { color:var(--green); font-weight:800; }
  .bracket-score { margin-left:auto; font-size:15px; font-weight:800; min-width:24px; text-align:right; }
  .tbd { color:var(--muted); font-style:italic; font-weight:400; font-size:12px; }

  /* CHAMPION */
  .champion { background:linear-gradient(135deg,#fef3c7,#fde68a); border:2px solid #f59e0b; border-radius:18px; padding:20px; text-align:center; margin-top:8px; }
  .champion .trophy { font-size:40px; }
  .champion .label { font-size:11px; font-weight:800; color:#78350f; text-transform:uppercase; letter-spacing:1px; margin-top:8px; }
  .champion .name { font-size:19px; font-weight:800; color:#92400e; margin-top:6px; }

  /* EQUIPES */
  .team-card { background:white; border-radius:12px; padding:12px 14px; margin-bottom:8px; border:1.5px solid var(--border); }
  .team-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:6px; }
  .team-name { font-size:14px; font-weight:700; }
  .team-num { font-size:11px; color:var(--muted); }
  .t-tag { font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; }
  .player { font-size:12px; color:#374151; padding:2px 0; display:flex; align-items:center; gap:6px; }
  .player::before { content:'•'; color:var(--green); }
  .lv { font-size:10px; font-weight:600; padding:1px 6px; border-radius:8px; background:#f3f4f6; color:var(--muted); margin-left:auto; }
  .lv-pro { background:#fef3c7; color:#92400e; }
  .lv-nat { background:#dcfce7; color:#166534; }
  .lv-reg { background:#dbeafe; color:#1d4ed8; }
  .lv-dep { background:#ede9fe; color:#6d28d9; }

  /* SEARCH */
  .search-input { width:100%; border:1.5px solid var(--border); border-radius:12px; padding:10px 14px; font-size:14px; background:white; margin-bottom:12px; }
  .search-input:focus { outline:none; border-color:var(--green); }

  /* EMPTY */
  .empty { text-align:center; padding:40px 20px; color:var(--muted); font-size:14px; }
  .empty .big { font-size:40px; margin-bottom:10px; }

  /* REFRESH */
  .refresh-bar { display:flex; align-items:center; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:10px; }
  .refresh-btn { background:var(--green-pale); border:none; border-radius:8px; padding:5px 10px; font-size:11px; font-weight:600; color:var(--green-dark); cursor:pointer; }
</style>
</head>

// ===== HELPERS =====
function getAllTeams() {
  var deleted = state.deletedTeams || [];
  var custom = state.customTeams || [];
  var overrides = custom.filter(function(t){ return t && t.isOverride; }).map(function(t){ return t.num; });
  var base = TEAMS_DATA.filter(function(t){ return !deleted.includes(t.num) && !overrides.includes(t.num); });
  var all = base.concat(custom.filter(function(t){ return t && t.num; }));
  return all.sort(function(a,b){ return a.num - b.num; });
}
function getTeamByNum(num) { return getAllTeams().find(function(t){ return t.num === num; }) || null; }
function getTeamsForT(t) {
  var name = TOURNOI_NAMES[t];
  return getAllTeams().filter(function(tm){ return tm.tournoi.toLowerCase() === name.toLowerCase(); });
}
function getMatchPairs(size) {
  if(size===3) return [['A','B'],['A','C'],['B','C']];
  if(size===4) return [['A','B'],['C','D'],['A','C'],['B','D'],['A','D'],['B','C']];
  if(size===5) return [['A','B'],['C','D'],['A','E'],['B','C'],['D','E'],['A','C'],['B','E'],['A','D'],['C','E'],['B','D']];
  return [];
}
function computeStandings(T, pKey, size, isElim) {
  var letters = ['A','B','C','D','E'].slice(0,size);
  var pairs = getMatchPairs(size);
  var stats = {};
  letters.forEach(function(l){ stats[l]={wins:0,diff:0}; });
  var pre = isElim ? (T+'_'+pKey) : (T+'_phase1_'+pKey);
  pairs.forEach(function(pair,mi){
    var sc = state.scores[pre+'_m'+mi];
    if(!sc||sc.home===''||sc.away==='') return;
    var h=parseInt(sc.home), a=parseInt(sc.away);
    if(isNaN(h)||isNaN(a)) return;
    if(h>a) stats[pair[0]].wins++; else if(a>h) stats[pair[1]].wins++;
    stats[pair[0]].diff+=(h-a); stats[pair[1]].diff+=(a-h);
  });
  return letters.map(function(l){
    var num=parseInt(state.poules[(isElim?(T+'_'+pKey):(T+'_phase1_'+pKey))+'_'+l]);
    var team=getTeamByNum(num);
    return {l:l,team:team,wins:stats[l].wins,diff:stats[l].diff,coeff:team?team.coeff:0};
  }).sort(function(a,b){ return b.wins-a.wins||b.diff-a.diff||b.coeff-a.coeff; });
}
function lvClass(niv) {
  var n=(niv||'').toLowerCase();
  if(n.includes('pro')||n.includes('cfc')) return 'lv-pro';
  if(n.includes('national')) return 'lv-nat';
  if(n.includes('régional')||n.includes('regional')) return 'lv-reg';
  if(n.includes('départemental')||n.includes('departemental')) return 'lv-dep';
  return '';
}

// ===== FIREBASE =====
function loadData() {
  fetch(FB_URL+'.json', {cache:'no-store'})
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data) {
        var toArr = function(v){ if(!v) return []; if(Array.isArray(v)) return v.filter(Boolean); if(typeof v==='object') return Object.values(v).filter(Boolean); return []; };
        state.poules      = data.poules      || {};
        state.scores      = data.scores      || {};
        state.config      = data.config      || {};
        state.elimScores  = data.elimScores  || {};
        state.customTeams = toArr(data.customTeams);
        state.deletedTeams= toArr(data.deletedTeams);
      }
      lastUpdate = new Date();
      updateStatus(true);
      refreshUI();
    })
    .catch(function(){ updateStatus(false); });
}

function updateStatus(ok) {
  var sub = document.getElementById('headerSub');
  var dot = document.getElementById('liveDot');
  if(ok) {
    dot.style.background = '#86efac';
    sub.textContent = 'En direct · Mis à jour ' + (lastUpdate ? lastUpdate.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '');
  } else {
    dot.style.background = '#fca5a5';
    sub.textContent = 'Hors ligne — dernière sync ' + (lastUpdate ? lastUpdate.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : 'jamais');
  }
}

function showPage(p) {
  document.querySelectorAll('.page').forEach(function(el){ el.classList.remove('active'); });

  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('btn-'+p).classList.add('active');
  if(p==='equipes') renderEquipes();
}

function refreshUI() {
  if(currentT) renderTournoi();
  if(document.getElementById('page-equipes').classList.contains('active')) renderEquipes();
}

function selectT(t) {
  currentT = t;
  currentPhase = 'phase1';
  document.querySelectorAll('.t-btn').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.t-btn.'+t).forEach(function(b){ b.classList.add('active'); });
  renderTournoi();
}

function renderTournoi() {
  if(!currentT) return;
  var T = currentT;
  var cfg = TOURNOI_CFG[T];

  var phasesHtml = ['phase1','principal','consolante'].map(function(ph){
    var lbl = ph==='phase1'?'1ère Phase':ph==='principal'?'🏆 Principal':'🥈 Consolante';
    return '<button class="phase-tab '+(ph===currentPhase?'active':'')+'" onclick="selPhase(\''+ph+'\')">' + lbl + '</button>';
  }).join('');

  var content = '<div class="phase-tabs">' + phasesHtml + '</div>';
  content += '<div style="font-size:14px;font-weight:700;color:var(--green-dark);margin-bottom:12px">' + cfg.label + '</div>';

  if(currentPhase === 'phase1') {
    content += renderPhase1View(T);
  } else {
    content += renderElimView(T, currentPhase);
  }

  document.getElementById('tournoiContent').innerHTML = content;
}

function selPhase(ph) {
  currentPhase = ph;
  renderTournoi();
}

function renderPhase1View(T) {
  var nb3=parseInt(state.config[T+'_phase1_nb3']||0);
  var nb4=parseInt(state.config[T+'_phase1_nb4']||0);
  var nb5=parseInt(state.config[T+'_phase1_nb5']||0);
  var total = nb3+nb4+nb5;

  if(total===0) return '<div class="empty"><div class="big">⏳</div>Les poules ne sont pas encore configurées.</div>';

  var html = '';
  var idx = 0;

  function addPoules(nb, size) {
    for(var i=0;i<nb;i++) {
      idx++;
      var pKey='p'+idx;
      var letters=['A','B','C','D','E'].slice(0,size);
      var pairs=getMatchPairs(size);
      var prefix=T+'_phase1_'+pKey;
      var standings=computeStandings(T,pKey,size,false);
      var rankCls=['r1','r2','r3','rn','rn'];

      html += '<div class="poule-block">';
      var terrainPoule = state.poules[T+'_phase1_'+pKey+'_terrain']||'';
      html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
      html += '<div class="poule-title">POULE ' + idx + '</div>';
      if(terrainPoule) html += '<span style="font-size:12px;font-weight:700;background:#f0fdf4;color:#14532d;padding:4px 10px;border-radius:10px;border:1px solid #a7f3d0">🏟️ Terrain ' + terrainPoule + '</span>';
      html += '</div>';

      // Matchs
      var hasMatches = false;
      var matchHtml = '';
      pairs.forEach(function(pair, mi) {
        var sc = state.scores[prefix+'_m'+mi]||{home:'',away:''};
        var tA = getTeamByNum(parseInt(state.poules[prefix+'_'+pair[0]]));
        var tB = getTeamByNum(parseInt(state.poules[prefix+'_'+pair[1]]));
        var nA = tA ? tA.nom.substring(0,18) : 'Éq.'+pair[0];
        var nB = tB ? tB.nom.substring(0,18) : 'Éq.'+pair[1];
        var h=parseInt(sc.home), a=parseInt(sc.away);
        var played = sc.home!==''&&sc.away!==''&&!isNaN(h)&&!isNaN(a);
        var winA=played&&h>a, winB=played&&a>h;
        hasMatches = true;
        matchHtml += '<div class="match-row">';
        matchHtml += '<div class="match-teams"><div class="match-name '+(winA?'winner':'')+'">' + nA + '</div><div class="match-name '+(winB?'winner':'')+'">' + nB + '</div></div>';
        if(played) {
          matchHtml += '<span class="score-badge '+(winA?'winner':'')+'">' + sc.home + '</span>';
          matchHtml += '<span class="score-sep">–</span>';
          matchHtml += '<span class="score-badge '+(winB?'winner':'')+'">' + sc.away + '</span>';
        } else {
          matchHtml += '<span class="pending">À jouer</span>';
        }
        matchHtml += '</div>';
      });
      if(matchHtml) html += matchHtml;

      // Classement
      html += '<table class="rank-table" style="margin-top:12px"><thead><tr><th>#</th><th>Équipe</th><th>V</th><th>Diff</th></tr></thead><tbody>';
      standings.forEach(function(r,i){
        var name = r.team ? r.team.nom.substring(0,18) : 'Éq.'+r.l;
        html += '<tr><td><span class="rank-badge '+rankCls[i]+'">'+(i+1)+'</span></td>';
        html += '<td style="font-weight:600;font-size:12px">'+name+'</td>';
        html += '<td style="font-weight:800;color:var(--green)">'+r.wins+'</td>';
        html += '<td style="color:'+(r.diff>0?'var(--green)':r.diff<0?'#dc2626':'var(--muted)')+';">'+(r.diff>0?'+':'')+r.diff+'</td></tr>';
      });
      html += '</tbody></table></div>';
    }
  }

  addPoules(nb3,3); addPoules(nb4,4); addPoules(nb5,5);
  return html;
}

  var hasAnyMatch = false;
  ROUNDS.forEach(function(round) {
    var roundHtml = '';
    for(var i=0; i<round.count; i++) {
      var mi = round.start + i;
      var k1 = T+'_'+ph+'_br_t1_'+mi;
      var k2 = T+'_'+ph+'_br_t2_'+mi;
      var kw = T+'_'+ph+'_br_win_'+mi;
      var t1num = parseInt(state.poules[k1]);
      var t2num = parseInt(state.poules[k2]);
      var winnum = parseInt(state.poules[kw]);
      var t1 = getTeamByNum(t1num);
      var t2 = getTeamByNum(t2num);
      var winner = getTeamByNum(winnum);
      var kt = T+'_'+ph+'_br_terrain_'+mi;
      var terrainMatch = state.poules[kt]||'';
      if(!t1 && !t2) continue;
      hasAnyMatch = true;
      var played = !!winner;
      roundHtml += '<div class="bracket-match '+(played?'played':'')+'">';
      if(terrainMatch) roundHtml += '<div style="font-size:10px;font-weight:700;background:#f0fdf4;color:#14532d;padding:3px 8px;border-radius:8px;margin-bottom:6px;display:inline-block">🏟️ Terrain ' + terrainMatch + '</div>';
      roundHtml += '<div class="bracket-team '+(winner&&t1&&winner.num===t1.num?'winner':'')+'">';
      roundHtml += '<span>'+(t1?t1.nom.substring(0,22):'<span class="tbd">À déterminer</span>')+'</span>';
      roundHtml += '</div>';
      roundHtml += '<div class="bracket-team '+(winner&&t2&&winner.num===t2.num?'winner':'')+'">';
      roundHtml += '<span>'+(t2?t2.nom.substring(0,22):'<span class="tbd">À déterminer</span>')+'</span>';
      roundHtml += '</div>';
      if(winner) roundHtml += '<div style="font-size:11px;color:var(--green);font-weight:700;margin-top:6px;text-align:center">✅ '+winner.nom+'</div>';
      roundHtml += '</div>';
    }
    if(roundHtml) {
      var isFin = round.label==='Finale';
      html += '<div class="round-title">'+(isFin?'🏆 ':'')+round.label+'</div>' + roundHtml;
    }
  });

  if(!hasAnyMatch) {
    html += '<div class="empty"><div class="big">⏳</div>Le tableau éliminatoire n\'est pas encore commencé.</div>';
  }

  // Champion
  var finWin = getTeamByNum(parseInt(state.poules[T+'_'+ph+'_br_win_14']));
  if(finWin) {
    var trophy = ph==='principal'?'🏆':'🥈';
    html += '<div class="champion"><div class="trophy">'+trophy+'</div>';
    html += '<div class="label">'+(ph==='principal'?'Champion du tournoi':'Vainqueur consolante')+'</div>';
    html += '<div class="name">'+finWin.nom+'</div>';
    html += '<div style="font-size:12px;color:#b45309;margin-top:4px">Équipe #'+finWin.num+'</div></div>';
  }

  return html || '<div class="empty"><div class="big">⏳</div>Phase pas encore commencée.</div>';
}

// ===== ÉQUIPES =====
function renderEquipes() {
  var search = (document.getElementById('searchInput').value||'').toLowerCase();
  var teams = getAllTeams().filter(function(t){
    return !search || t.nom.toLowerCase().includes(search) || t.joueurs.some(function(j){ return j.nom.toLowerCase().includes(search); });
  });
  var tMap = {'tournoi jeunes':'jeunes','tournoi mixte':'mixte','tournoi féminin':'feminin','loisir masculin':'loisir','élite masculin':'elite'};
  var html = '<div style="font-size:12px;color:var(--muted);margin-bottom:10px">'+teams.length+' équipe'+(teams.length>1?'s':'')+'</div>';
  teams.forEach(function(t){
    var tKey = tMap[t.tournoi.toLowerCase()]||'mixte';
    var cfg = TOURNOI_CFG[tKey];
    html += '<div class="team-card"><div class="team-header">';
    html += '<div><div class="team-name">'+t.nom+'</div><div class="team-num">#'+t.num+' · Coeff '+t.coeff+'</div></div>';
    html += '<span class="t-tag" style="background:'+cfg.tagBg+';color:'+cfg.tagColor+'">'+cfg.tag+'</span>';
    html += '</div>';
    t.joueurs.forEach(function(j){
      html += '<div class="player">'+j.nom+(j.niv?'<span class="lv '+lvClass(j.niv)+'">'+j.niv+'</span>':'')+'</div>';
    });
    html += '</div>';
  });
  document.getElementById('equipesContent').innerHTML = html;
}

loadData();
